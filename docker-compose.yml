services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: orgchat-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: orgchat
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orgchat-network

  # Backend Service (Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orgchat-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # MongoDB Configuration
      SPRING_DATA_MONGODB_URI: mongodb://admin:password@mongodb:27017/orgchat?authSource=admin
      SPRING_DATA_MONGODB_AUTO_INDEX_CREATION: "true"

      # JWT Configuration
      APP_JWT_SECRET: your-super-secret-jwt-key-change-in-production
      APP_JWT_EXPIRATION_MS: 86400000
      APP_JWT_REFRESH_EXPIRATION_MS: 604800000

      # CORS Configuration — update NGROK_URL when ngrok restarts
      APP_CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:4200,https://7a80-49-204-20-15.ngrok-free.app

      # OAuth2 Google Configuration
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: 183781504942-bkeaqdp7i1qlk3h4iendge0i0j406ua3.apps.googleusercontent.com
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: 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
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI: https://7a80-49-204-20-15.ngrok-free.app/login/oauth2/code/google

      # Frontend Configuration
      APP_FRONTEND_REDIRECT_URL: https://7a80-49-204-20-15.ngrok-free.app/login

      # Server Configuration
      SERVER_PORT: 8080
      SERVER_SERVLET_CONTEXT_PATH: /

    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - orgchat-network

  # Frontend Service (Angular + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orgchat-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - orgchat-network

  # Mongo Express - MongoDB admin UI (Optional)
  mongo-express:
    image: mongo-express:latest
    container_name: orgchat-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_SITE_SSL_ENABLED: "false"
    depends_on:
      - mongodb
    networks:
      - orgchat-network
    profiles:
      - debug

networks:
  orgchat-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local