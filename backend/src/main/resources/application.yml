server:
  port: 8080

spring:
  application:
    name: orgchat-backend

  data:
    mongodb:
      uri: mongodb://localhost:27017/orgchat
      database: orgchat

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 183781504942-bkeaqdp7i1qlk3h4iendge0i0j406ua3.apps.googleusercontent.com
            client-secret: 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
            scope: openid, profile, email
            redirect-uri: "http://localhost:8080/login/oauth2/code/google"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

# Custom application properties
app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  cors:
    allowed-origins: http://localhost:4200
  frontend:
    redirect-url: http://localhost:4200/login

# Logging configuration
logging:
  level:
    root: WARN
    com.orgchat: DEBUG
    com.orgchat.security: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.springframework.data.mongodb: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"